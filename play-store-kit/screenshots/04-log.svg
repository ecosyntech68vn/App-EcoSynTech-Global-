  <!-- Form -->
  <text x="60" y="280" font-family="Arial" font-size="26" font-weight="700" fill="#5C6B6B">HOẠT ĐỘNG</text>
  <rect x="60" y="300" width="960" height="100" rx="16" fill="white" stroke="#E1E5DD" stroke-width="2"/>
  <text x="100" y="365" font-family="Arial" font-size="36" fill="#1A1A1A">Tưới nước</text>
  <text x="990" y="365" text-anchor="end" font-family="Arial" font-size="36" fill="#5C6B6B">▾</text>

  <text x="60" y="460" font-family="Arial" font-size="26" font-weight="700" fill="#5C6B6B">ZONE</text>
  <rect x="60" y="480" width="960" height="100" rx="16" fill="white" stroke="#E1E5DD" stroke-width="2"/>
  <text x="100" y="545" font-family="Arial" font-size="36" fill="#1A1A1A">Z01</text>

  <text x="60" y="640" font-family="Arial" font-size="26" font-weight="700" fill="#5C6B6B">GHI CHÚ</text>
  <rect x="60" y="660" width="960" height="220" rx="16" fill="white" stroke="#E1E5DD" stroke-width="2"/>
  <text x="100" y="725" font-family="Arial" font-size="32" fill="#1A1A1A">Tưới 30 phút lúc 14h.</text>
  <text x="100" y="780" font-family="Arial" font-size="32" fill="#1A1A1A">Đất khô do nắng to.</text>

  <text x="60" y="940" font-family="Arial" font-size="26" font-weight="700" fill="#5C6B6B">ẢNH</text>
  <rect x="60" y="960" width="720" height="120" rx="16" fill="white" stroke="#2E7D32" stroke-width="3"/>
  <text x="420" y="1035" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#2E7D32">📷 Chụp ảnh</text>
  <rect x="800" y="960" width="220" height="120" rx="16" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="3"/>
  <text x="910" y="1035" text-anchor="middle" font-family="Arial" font-size="60">🌱</text>

  <!-- Save button -->
  <rect x="60" y="1140" width="960" height="120" rx="16" fill="#2E7D32"/>
  <text x="540" y="1218" text-anchor="middle" font-family="Arial" font-size="42" font-weight="700" fill="white">Lưu nhật ký</text>
  <text x="540" y="1310" text-anchor="middle" font-family="Arial" font-size="26" fill="#5C6B6B">⏳ 2 entry chờ sync</text>

  <!-- Recent -->
  <text x="60" y="1400" font-family="Arial" font-size="26" font-weight="700" fill="#5C6B6B">GẦN ĐÂY</text>

  <rect x="60" y="1430" width="960" height="160" rx="20" fill="white"/>
  <text x="100" y="1490" font-family="Arial" font-size="36" font-weight="700" fill="#1A1A1A">Bón phân · Z02</text>
  <text x="100" y="1540" font-family="Arial" font-size="26" fill="#5C6B6B">10/06/2026 12:15</text>
  <rect x="820" y="1455" width="180" height="48" rx="24" fill="#D4EDDA"/>
  <text x="910" y="1488" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#155724">SYNCED</text>

  <rect x="60" y="1610" width="960" height="160" rx="20" fill="white"/>
  <text x="100" y="1670" font-family="Arial" font-size="36" font-weight="700" fill="#1A1A1A">Xử lý sâu · Z01</text>
  <text x="100" y="1720" font-family="Arial" font-size="26" fill="#5C6B6B">10/06/2026 09:30</text>
  <rect x="820" y="1635" width="180" height="48" rx="24" fill="#F8D7DA"/>
  <text x="910" y="1668" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#721C24">PENDING</text>

  <!-- Bottom nav -->
  <rect x="0" y="1770" width="1080" height="150" fill="white"/>
  <g font-family="Arial" font-size="22">
    <text x="108" y="1830" text-anchor="middle" font-size="40">📊</text>
    <text x="108" y="1870" text-anchor="middle" fill="#5C6B6B">Sensor</text>
    <text x="324" y="1830" text-anchor="middle" font-size="40">🚨</text>
    <text x="324" y="1870" text-anchor="middle" fill="#5C6B6B">Alert</text>
    <text x="540" y="1830" text-anchor="middle" font-size="40">📝</text>
    <text x="540" y="1870" text-anchor="middle" fill="#2E7D32" font-weight="700">Log</text>
    <text x="756" y="1830" text-anchor="middle" font-size="40">✅</text>
    <text x="756" y="1870" text-anchor="middle" fill="#5C6B6B">Task</text>
    <text x="972" y="1830" text-anchor="middle" font-size="40">⚙️</text>
    <text x="972" y="1870" text-anchor="middle" fill="#5C6B6B">Cài đặt</text>
  </g>
