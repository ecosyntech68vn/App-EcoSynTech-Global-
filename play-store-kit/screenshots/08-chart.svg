<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#F7F8F5"/>
  <rect x="0" y="0" width="1080" height="80" fill="#1B5E20"/>
  <rect x="0" y="80" width="1080" height="120" fill="#2E7D32"/>
  <text x="60" y="160" font-family="Arial" font-size="46" font-weight="700" fill="white">📈 Biểu đồ lịch sử</text>

  <!-- Selectors -->
  <rect x="60" y="240" width="500" height="100" rx="12" fill="white" stroke="#E1E5DD" stroke-width="2"/>
  <text x="100" y="305" font-family="Arial" font-size="32" fill="#1A1A1A">🌡 Temperature</text>

  <rect x="580" y="240" width="280" height="100" rx="12" fill="white" stroke="#E1E5DD" stroke-width="2"/>
  <text x="720" y="305" text-anchor="middle" font-family="Arial" font-size="32" fill="#1A1A1A">24 giờ ▾</text>

  <rect x="880" y="240" width="140" height="100" rx="12" fill="#2E7D32"/>
  <text x="950" y="305" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="white">Tải</text>

  <!-- Chart canvas -->
  <rect x="60" y="380" width="960" height="700" rx="20" fill="white"/>
  <text x="120" y="440" font-family="Arial" font-size="22" font-weight="700" fill="#C62828">temp (24h) · Live</text>

  <!-- X axis -->
  <line x1="160" y1="970" x2="980" y2="970" stroke="#E1E5DD" stroke-width="2"/>
  <g font-family="Arial" font-size="20" fill="#5C6B6B">
    <text x="160" y="1010" text-anchor="middle">0h</text>
    <text x="365" y="1010" text-anchor="middle">6h</text>
    <text x="570" y="1010" text-anchor="middle">12h</text>
    <text x="775" y="1010" text-anchor="middle">18h</text>
    <text x="980" y="1010" text-anchor="middle">24h</text>
  </g>
  <!-- Y axis labels -->
  <g font-family="Arial" font-size="20" fill="#5C6B6B" text-anchor="end">
    <text x="140" y="490">35</text>
    <text x="140" y="610">30</text>
    <text x="140" y="730">25</text>
    <text x="140" y="850">20</text>
    <text x="140" y="970">15</text>
  </g>

  <!-- Line chart (fake temp curve) -->
  <path d="M 160 820 Q 250 800, 365 870 T 570 750 T 775 540 T 980 600"
        fill="none" stroke="#C62828" stroke-width="5"/>
  <path d="M 160 820 Q 250 800, 365 870 T 570 750 T 775 540 T 980 600 L 980 970 L 160 970 Z"
        fill="#C6282820"/>

  <!-- Data points -->
  <g fill="#C62828">
    <circle cx="160" cy="820" r="6"/>
    <circle cx="365" cy="860" r="6"/>
    <circle cx="570" cy="750" r="6"/>
    <circle cx="775" cy="540" r="6"/>
    <circle cx="980" cy="600" r="6"/>
  </g>

  <!-- Stats card -->
  <rect x="60" y="1140" width="960" height="200" rx="20" fill="white"/>
  <g font-family="Arial">
    <text x="170" y="1200" text-anchor="middle" font-size="22" font-weight="700" fill="#5C6B6B">MIN</text>
    <text x="170" y="1270" text-anchor="middle" font-size="48" font-weight="800" fill="#1A1A1A">18.4</text>

    <text x="410" y="1200" text-anchor="middle" font-size="22" font-weight="700" fill="#5C6B6B">AVG</text>
    <text x="410" y="1270" text-anchor="middle" font-size="48" font-weight="800" fill="#1A1A1A">27.3</text>

    <text x="650" y="1200" text-anchor="middle" font-size="22" font-weight="700" fill="#5C6B6B">MAX</text>
    <text x="650" y="1270" text-anchor="middle" font-size="48" font-weight="800" fill="#C62828">34.8</text>

    <text x="890" y="1200" text-anchor="middle" font-size="22" font-weight="700" fill="#5C6B6B">POINTS</text>
    <text x="890" y="1270" text-anchor="middle" font-size="48" font-weight="800" fill="#1A1A1A">144</text>
  </g>
</svg>
