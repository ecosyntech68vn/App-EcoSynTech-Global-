  <text x="1020" y="260" text-anchor="end" font-family="Arial" font-size="28" fill="#5C6B6B">Filter: Đang mở ▾</text>

  <!-- Critical alert -->
  <rect x="60" y="320" width="960" height="280" rx="24" fill="white"/>
  <rect x="60" y="320" width="12" height="280" fill="#C62828"/>
  <text x="120" y="390" font-family="Arial" font-size="40" font-weight="700" fill="#1A1A1A">⚠ Nhiệt độ vượt ngưỡng</text>
  <text x="120" y="445" font-family="Arial" font-size="28" fill="#5C6B6B">Zone Z03 · CRITICAL</text>
  <text x="120" y="495" font-family="Arial" font-size="26" fill="#5C6B6B">10/06/2026 14:23:11</text>
  <text x="120" y="555" font-family="Arial" font-size="30" fill="#1A1A1A">Temp 41.8°C vượt threshold 38°C</text>

  <rect x="800" y="380" width="180" height="80" rx="12" fill="white" stroke="#2E7D32" stroke-width="3"/>
  <text x="890" y="430" text-anchor="middle" font-family="Arial" font-size="32" font-weight="700" fill="#2E7D32">Ack</text>

  <!-- Warning alert -->
  <rect x="60" y="640" width="960" height="280" rx="24" fill="white"/>
  <rect x="60" y="640" width="12" height="280" fill="#F9A825"/>
  <text x="120" y="710" font-family="Arial" font-size="40" font-weight="700" fill="#1A1A1A">Độ ẩm thấp</text>
  <text x="120" y="765" font-family="Arial" font-size="28" fill="#5C6B6B">Zone Z02 · WARNING</text>
  <text x="120" y="815" font-family="Arial" font-size="26" fill="#5C6B6B">10/06/2026 13:45:02</text>
  <text x="120" y="875" font-family="Arial" font-size="30" fill="#1A1A1A">Hum 38% — đề nghị tưới</text>

  <rect x="800" y="700" width="180" height="80" rx="12" fill="white" stroke="#2E7D32" stroke-width="3"/>
  <text x="890" y="750" text-anchor="middle" font-family="Arial" font-size="32" font-weight="700" fill="#2E7D32">Ack</text>

  <!-- Info alert -->
  <rect x="60" y="960" width="960" height="280" rx="24" fill="white"/>
  <rect x="60" y="960" width="12" height="280" fill="#2E7D32"/>
  <text x="120" y="1030" font-family="Arial" font-size="40" font-weight="700" fill="#1A1A1A">Sensor maintenance</text>
  <text x="120" y="1085" font-family="Arial" font-size="28" fill="#5C6B6B">Zone Z01 · INFO</text>
  <text x="120" y="1135" font-family="Arial" font-size="26" fill="#5C6B6B">10/06/2026 09:00:00</text>
  <text x="120" y="1195" font-family="Arial" font-size="30" fill="#1A1A1A">Kiểm tra pin sensor pH</text>

  <rect x="800" y="1020" width="180" height="80" rx="12" fill="white" stroke="#2E7D32" stroke-width="3"/>
  <text x="890" y="1070" text-anchor="middle" font-family="Arial" font-size="32" font-weight="700" fill="#2E7D32">Ack</text>

  <!-- Bottom nav -->
  <rect x="0" y="1770" width="1080" height="150" fill="white"/>
  <line x1="0" y1="1770" x2="1080" y2="1770" stroke="#E1E5DD" stroke-width="2"/>
  <g font-family="Arial" font-size="22">
    <text x="108" y="1830" text-anchor="middle" font-size="40">📊</text>
    <text x="108" y="1870" text-anchor="middle" fill="#5C6B6B">Sensor</text>
    <text x="324" y="1830" text-anchor="middle" font-size="40">🚨</text>
    <text x="324" y="1870" text-anchor="middle" fill="#2E7D32" font-weight="700">Alert</text>
    <circle cx="365" cy="1810" r="20" fill="#C62828"/>
    <text x="365" y="1820" text-anchor="middle" fill="white" font-size="22" font-weight="700">3</text>
    <text x="540" y="1830" text-anchor="middle" font-size="40">📝</text>
    <text x="540" y="1870" text-anchor="middle" fill="#5C6B6B">Log</text>
    <text x="756" y="1830" text-anchor="middle" font-size="40">✅</text>
    <text x="756" y="1870" text-anchor="middle" fill="#5C6B6B">Task</text>
    <text x="972" y="1830" text-anchor="middle" font-size="40">⚙️</text>
    <text x="972" y="1870" text-anchor="middle" fill="#5C6B6B">Cài đặt</text>
  </g>
