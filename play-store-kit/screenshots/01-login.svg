  <text x="540" y="1300" text-anchor="middle" font-family="Arial" font-size="40" font-weight="700" fill="white">Đăng nhập</text>

  <rect x="120" y="1370" width="840" height="110" rx="16" fill="white" stroke="#2E7D32" stroke-width="3"/>
  <text x="540" y="1440" text-anchor="middle" font-family="Arial" font-size="40" font-weight="700" fill="#2E7D32">Test kết nối</text>

  <!-- Footer -->
  <text x="540" y="1700" text-anchor="middle" font-family="Arial" font-size="28" fill="#A5D6A7">v1.0.0 · Offline-first · Frugal · Human-centric</text>
