<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg1)"/>

  <!-- Phone status bar -->
  <rect x="0" y="0" width="1080" height="80" fill="rgba(0,0,0,0.2)"/>
  <text x="60" y="55" font-family="Arial" font-size="32" fill="white" font-weight="700">14:25</text>
  <text x="1020" y="55" text-anchor="end" font-family="Arial" font-size="28" fill="white">📶 🔋</text>

  <!-- Logo -->
