  <text x="120" y="700" font-family="Arial" font-size="28" font-weight="700" fill="#5C6B6B">SERVER URL</text>
  <rect x="120" y="720" width="840" height="100" rx="16" fill="#F7F8F5" stroke="#E1E5DD" stroke-width="2"/>
  <text x="150" y="785" font-family="Courier" font-size="36" fill="#1A1A1A">http://192.168.1.100:3000</text>

  <text x="120" y="880" font-family="Arial" font-size="28" font-weight="700" fill="#5C6B6B">CHẾ ĐỘ MẠNG</text>
  <rect x="120" y="900" width="840" height="100" rx="16" fill="#F7F8F5" stroke="#E1E5DD" stroke-width="2"/>
  <text x="150" y="965" font-family="Arial" font-size="36" fill="#1A1A1A">Auto (LAN → fallback Cloud)</text>
  <text x="930" y="965" text-anchor="end" font-family="Arial" font-size="36" fill="#5C6B6B">▾</text>

  <text x="120" y="1060" font-family="Arial" font-size="28" font-weight="700" fill="#5C6B6B">PIN 4 SỐ</text>
  <rect x="120" y="1080" width="840" height="100" rx="16" fill="#F7F8F5" stroke="#E1E5DD" stroke-width="2"/>
  <text x="540" y="1150" text-anchor="middle" font-family="Arial" font-size="56" letter-spacing="20" fill="#1A1A1A">● ● ● ●</text>

