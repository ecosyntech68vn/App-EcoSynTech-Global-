<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6C158"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <!-- Background squircle -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Leaf -->
  <path d="M256 90 C 360 130, 410 230, 380 340 C 350 410, 270 440, 210 410 C 270 380, 320 320, 340 240 C 320 280, 280 320, 230 340 C 200 280, 210 180, 256 90 Z" fill="url(#leaf)" opacity="0.95"/>

  <!-- Center sprout stem -->
  <rect x="248" y="180" width="16" height="180" rx="8" fill="url(#gold)"/>

  <!-- Sensor dot ring (champagne gold) -->
  <circle cx="256" cy="170" r="38" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <circle cx="256" cy="170" r="14" fill="url(#gold)"/>

  <!-- Data points -->
  <circle cx="170" cy="290" r="10" fill="#FFEB3B"/>
  <circle cx="342" cy="270" r="10" fill="#03A9F4"/>
  <circle cx="200" cy="380" r="10" fill="#F44336"/>

  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Farm OS</text>
</svg>
